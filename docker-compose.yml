version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./data:/data
      - ./uploads:/app/uploads
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-/data/accounts-docker.db}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-please}
      PORT: ${PORT:-4000}
    restart: unless-stopped
